server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  
  datasource:
    url: jdbc:h2:mem:lifesync
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false
  
  h2:
    console:
      enabled: true
      path: /h2-console

# SpringDoc OpenAPI Configuration (Enterprise-grade)
springdoc:
  # API Documentation
  api-docs:
    path: /v3/api-docs
    enabled: true
    resolve-schema-properties: true
  
  # Swagger UI Configuration
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    # Sorting and organization
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    show-extensions: true
    show-common-extensions: true
    # UI Customization
    disable-swagger-default-url: true
    display-operation-id: false
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    # Filtering
    filter: true
    filter-string: ""
    try-it-out-enabled: true
    # Syntax highlighting
    syntax-highlight:
      activated: true
      theme: agate
  
  # OpenAPI Specification
  writer-with-default-pretty-printer: true
  cache:
    disabled: false
  
  # Model conversion
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  
  # Security
  auto-tag-classes: true
  model-and-view-supported: true
  paths-to-match: /**
  
  # Actuator integration
  show-actuator: true
  use-management-port: false
  
  # Group configuration
  group-configs:
    - group: 'public-api'
      display-name: 'Public API'
      packages-to-scan: 'com.lifesync.controller'
      paths-to-match: '/api/**'
    - group: 'auth-api'
      display-name: 'Authentication API'
      packages-to-scan: 'com.lifesync.controller'
      paths-to-match: '/api/auth/**'
    - group: 'ai-api'
      display-name: 'AI Coach API'
      packages-to-scan: 'com.lifesync.controller'
      paths-to-match: '/api/ai/**'

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.lifesync: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
